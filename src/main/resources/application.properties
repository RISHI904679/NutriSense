spring.application.name=nutrisense
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
debug=false
logging.level.root=INFO

# MySQL datasource for the existing nutrisense database.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nutrisense?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Rishi@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA is configured to never create, update, or drop database tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Prevent Spring from running schema.sql or data.sql against the existing database.
spring.sql.init.mode=never

# JWT setup values are placeholders for future security implementation.
app.jwt.secret=${JWT_SECRET:change-this-development-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=${SERVER_PORT:8080}
